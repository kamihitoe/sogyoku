#baseURL: 'https://sogyoku.netlify.app/'
languageCode: 'zh-CN'
title: 'ソギョク 的域'
theme: 'hextra'

params:
  navbar:
    displayTitle: true
    displayLogo: false # 不显示logo
    logo:
      path: images/logo.svg
      # dark: images/logo-dark.svg
      link: /
  footer:
    # display: true
    # content: ""

  theme:
    default: system
    displayToggle: true

  page:
    # full (100%), wide (90rem), normal (1280px)
    width: normal
    contextMenu:
      enable: true
  
  imageZoom:
    enable: true # 开启图片缩放

  displayUpdatedDate: false # 是否显示更新日期
  dateFormat: "2006/1/2" # 日期格式
  highlight:
    copy:
      enable: true
      display: always # hover | always
  
  # 显示标签
  blog:
    list:
      displayTags: true
  toc:
    displayTags: true

# 输出格式
outputs:
  page: [html, markdown]
  section: [html, rss, markdown]


markup:
  goldmark:
    renderer:
      unsafe: true # 允许HTML
      hardWraps: true # 单个换行符也渲染为 <br>
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ["$$", "$$"]]
          inline: [['\(', '\)'],['$', '$']]
        enable: true
  highlight:
    noClasses: false # 启用代码高亮

menu:
  main:
    - name: 首页
      pageRef: /
      weight: 1
    - name: 笔记
      pageRef: /note
      weight: 2
    - name: 题解
      pageRef: /sol
      weight: 3
    - name: 写作
      pageRef: /writing
      weight: 4
    - name: 生活记录
      pageRef: /life
      weight: 5
    - name: 杂谈
      pageRef: /misc
      weight: 6
    - name: 关于
      pageRef: /about
      weight: 10    
    - name: 搜索
      weight: 20
      params:
        type: search
    - name: 切换主题
      weight: 40
      params:
        type: theme-toggle
        label: false # 不显示文字，只显示图标